name: Template Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  repo-sync:
    if: github.repository != 'xxxyyy TU_ORG/TU_TEMPLATE xxxyyy'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: xxxyyy TU_ORG/TU_TEMPLATE xxxyyy
          upstream_branch: main
          pr_labels: template_sync
